<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07070d"/>
      <stop offset="50%" style="stop-color:#0f0f2a"/>
      <stop offset="100%" style="stop-color:#07070d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b5cff"/>
      <stop offset="100%" style="stop-color:#00e5a0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow circles -->
  <circle cx="200" cy="315" r="220" fill="rgba(91,92,255,0.08)"/>
  <circle cx="1000" cy="315" r="180" fill="rgba(0,229,160,0.06)"/>

  <!-- Logo icon box -->
  <rect x="80" y="200" width="72" height="72" rx="18" fill="#5b5cff"/>
  <text x="116" y="250" font-size="36" text-anchor="middle" dominant-baseline="middle">📄</text>

  <!-- Logo text -->
  <text x="170" y="236" font-family="Arial Black, Arial, sans-serif" font-size="42" font-weight="900" fill="white">PDFTash</text>

  <!-- Gradient underline -->
  <rect x="170" y="248" width="280" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main headline -->
  <text x="80" y="330" font-family="Arial Black, Arial, sans-serif" font-size="58" font-weight="900" fill="white">Free PDF Tools with AI</text>

  <!-- Subline -->
  <text x="80" y="390" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.55)">Compress · Merge · Translate · Chat · Sign</text>

  <!-- Feature pills -->
  <rect x="80" y="430" width="160" height="40" rx="20" fill="rgba(91,92,255,0.25)" stroke="rgba(91,92,255,0.5)" stroke-width="1"/>
  <text x="160" y="456" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#a0a0ff" text-anchor="middle">No signup needed</text>

  <rect x="256" y="430" width="140" height="40" rx="20" fill="rgba(0,229,160,0.2)" stroke="rgba(0,229,160,0.4)" stroke-width="1"/>
  <text x="326" y="456" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#00e5a0" text-anchor="middle">100% Free</text>

  <rect x="412" y="430" width="180" height="40" rx="20" fill="rgba(255,204,68,0.15)" stroke="rgba(255,204,68,0.35)" stroke-width="1"/>
  <text x="502" y="456" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#ffcc44" text-anchor="middle">Bengali Support</text>

  <!-- Right side: tool icons -->
  <g transform="translate(820, 160)">
    <!-- Cards -->
    <rect width="300" height="310" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <text x="24" y="55" font-family="Arial, sans-serif" font-size="22">🗜️</text>
    <text x="56" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Compress PDF</text>
    <text x="56" y="68" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Reduce file size</text>

    <line x1="24" y1="86" x2="276" y2="86" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="24" y="120" font-family="Arial, sans-serif" font-size="22">🔗</text>
    <text x="56" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Merge PDF</text>
    <text x="56" y="133" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Combine files</text>

    <line x1="24" y1="151" x2="276" y2="151" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="24" y="185" font-family="Arial, sans-serif" font-size="22">🌐</text>
    <text x="56" y="180" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Translate PDF</text>
    <text x="56" y="198" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">Bengali &amp; 12+ languages</text>

    <line x1="24" y1="216" x2="276" y2="216" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="24" y="250" font-family="Arial, sans-serif" font-size="22">💬</text>
    <text x="56" y="245" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white">Chat with PDF</text>
    <text x="56" y="263" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.4)">AI-powered answers</text>

    <line x1="24" y1="281" x2="276" y2="281" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <text x="150" y="305" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,255,255,0.3)" text-anchor="middle">20+ tools available</text>
  </g>

  <!-- URL badge -->
  <rect x="80" y="555" width="200" height="36" rx="18" fill="rgba(255,255,255,0.07)"/>
  <text x="180" y="578" font-family="Arial, sans-serif" font-size="15" fill="rgba(255,255,255,0.5)" text-anchor="middle">pdftash.com</text>
</svg>
